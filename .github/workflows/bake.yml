name: Bake travel data

# Rebuilds data.js from the Google Sheet (via the Apps Script gate's mapdata
# endpoint). Fired by the sheet's onChange trigger (repository_dispatch) or
# manually from the Actions tab.

on:
  repository_dispatch:
    types: [bake-travel]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bake-travel
  cancel-in-progress: true

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch travel data from the gate
        env:
          GATE_URL: ${{ vars.GATE_URL }}
        run: |
          if [ -z "$GATE_URL" ]; then
            echo "::error::Repo Actions variable GATE_URL is not set."
            exit 1
          fi
          # -L follows the Apps Script 302 → googleusercontent redirect.
          curl -sSL --fail --retry 3 "${GATE_URL}?action=mapdata" -o raw.json
          echo "Fetched $(wc -c < raw.json) bytes."

      - name: Validate JSON and write data.js
        run: |
          # Fail loudly if the endpoint returned an error page / bad JSON.
          node -e '
            const fs = require("fs");
            const raw = fs.readFileSync("raw.json", "utf8");
            let data;
            try { data = JSON.parse(raw); }
            catch (e) { console.error("::error::mapdata is not valid JSON:", e.message); process.exit(1); }
            const countries = data && data.countries ? data.countries : data;
            if (!countries || typeof countries !== "object" || Array.isArray(countries)) {
              console.error("::error::Unexpected mapdata shape."); process.exit(1);
            }
            const n = Object.keys(countries).length;
            if (n === 0) { console.error("::error::mapdata is empty; refusing to overwrite."); process.exit(1); }
            const header =
              "// Baked travel data — auto-generated by .github/workflows/bake.yml from the\n" +
              "// Google Sheet (via the Apps Script gate). Do not hand-edit; edit the Sheet.\n" +
              "window.TRAVEL_DATA = ";
            fs.writeFileSync("data.js", header + JSON.stringify(countries, null, 2) + ";\n");
            console.log("Wrote data.js with " + n + " countries.");
          '
          rm -f raw.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.js; then
            echo "No change to data.js."
          else
            git add data.js
            git commit -m "chore: rebake travel data [skip ci]"
            git push
            echo "Pushed updated data.js."
          fi
